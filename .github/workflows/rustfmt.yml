name: Rustfmt

on:
  push:
    paths:
      - '**/*.rs'
      - '**/rustfmt.toml'
      - '.github/workflows/rustfmt.yml'
  pull_request:
    paths:
      - '**/*.rs'
      - '**/rustfmt.toml'
      - '.github/workflows/rustfmt.yml'

env:
    CARGO_TERM_COLOR: always

jobs:
    fmt:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Restore target
              uses: actions/cache@v5
              with:
                path: |
                  target
                  ~/.cargo
                key: fmt-target-${{ matrix.rust }}
                restore-keys: fmt-target-${{ matrix.rust }}

            - name: Install Rust
              uses: actions-rs/toolchain@v1
              with:
                toolchain: nightly
                override: true
                components: rustfmt

            - name: Check formatting
              run: cargo fmt -- --check
