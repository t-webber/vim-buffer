name: Clippy

on:
  push:
    paths:
      - '**/*.rs'
      - '.github/workflows/clippy.yml'
      - 'Cargo.*'
      - 'clippy.toml'
  pull_request:
    paths:
      - '**/*.rs'
      - 'Cargo.*'
      - 'clippy.toml'

env:
    CARGO_TERM_COLOR: always

jobs:
    clippy:
        runs-on: ubuntu-latest
        strategy:
          matrix:
            rust: [stable, nightly]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Restore target
              uses: actions/cache@v5
              with:
                path: |
                  target
                  ~/.cargo
                key: clippy-target-${{ matrix.rust }}
                restore-keys: clippy-target-${{ matrix.rust }}

            - name: Install Rust
              uses: actions-rs/toolchain@v1
              with:
                toolchain: ${{ matrix.rust }}
                override: true
                components: clippy

            - name: Cargo clippy
              run: cargo clippy --all --all-targets
